<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja Strona Startowa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
  }
  #overlay {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    z-index: 10;
  }
  #time-display {
    font-size: 2.5rem;
    font-weight: bold;
    letter-spacing: 4px;
    image-rendering: pixelated;
  }
  #greeting {
    font-size: 1.1rem;
    margin-top: 4px;
    letter-spacing: 2px;
  }
  #period-display {
    font-size: 0.85rem;
    margin-top: 2px;
    opacity: 0.9;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #weather-info {
    font-size: 0.78rem;
    margin-top: 4px;
    opacity: 0.88;
    letter-spacing: 2px;
  }
  #audio-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 20;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.35);
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    padding: 8px 14px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    user-select: none;
  }
  #audio-btn:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="time-display">00:00:00</div>
  <div id="greeting">Dzień dobry!</div>
  <div id="period-display">Ranek</div>
  <div id="weather-info"></div>
</div>
<button id="audio-btn">♪ Dźwięk: OFF</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H, SCALE;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  SCALE = Math.max(2, Math.floor(Math.min(W, H) / 200));
}
resize();
window.addEventListener('resize', resize);

// Time helpers
function getTimeFraction() {
  const now = new Date();
  return (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) / 86400;
}

function getPeriod(h) {
  if (h >= 5 && h < 8) return 'dawn';
  if (h >= 8 && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'day';
  if (h >= 17 && h < 20) return 'evening';
  if (h >= 20 && h < 22) return 'dusk';
  return 'night';
}

// Color lerp
function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0]-a[0])*t),
    Math.round(a[1] + (b[1]-a[1])*t),
    Math.round(a[2] + (b[2]-a[2])*t)
  ];
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

// Sky palettes per period
const skyPalettes = {
  night:   { top: [5, 5, 25],     bottom: [10, 10, 40] },
  dawn:    { top: [30, 20, 80],   bottom: [220, 100, 60] },
  morning: { top: [80, 140, 220], bottom: [255, 200, 120] },
  day:     { top: [60, 140, 255], bottom: [160, 210, 255] },
  evening: { top: [20, 60, 160],  bottom: [255, 140, 60] },
  dusk:    { top: [15, 20, 80],   bottom: [180, 80, 50] },
};

const groundColors = {
  night:   [20, 35, 20],
  dawn:    [35, 60, 30],
  morning: [55, 100, 45],
  day:     [70, 130, 50],
  evening: [50, 90, 40],
  dusk:    [30, 55, 25],
};

// Stars
const stars = Array.from({length: 120}, () => ({
  x: Math.random(),
  y: Math.random() * 0.6,
  r: Math.random() < 0.3 ? 2 : 1,
  blink: Math.random() * Math.PI * 2,
  speed: 0.5 + Math.random() * 1.5
}));

// Clouds
const clouds = Array.from({length: 5}, (_, i) => ({
  x: i * 0.22 + Math.random() * 0.1,
  y: 0.08 + Math.random() * 0.15,
  w: 4 + Math.floor(Math.random() * 4),
  speed: 0.00003 + Math.random() * 0.00002,
  alpha: 0.7 + Math.random() * 0.3
}));

// Birds
const birds = Array.from({length: 6}, () => ({
  x: Math.random(),
  y: 0.1 + Math.random() * 0.25,
  speed: 0.0001 + Math.random() * 0.0002,
  flap: Math.random() * Math.PI * 2,
  flapSpeed: 3 + Math.random() * 4,
  size: 1 + Math.floor(Math.random() * 2)
}));

// Fireflies
const fireflies = Array.from({length: 18}, () => ({
  x: 0.05 + Math.random() * 0.9,
  y: 0.5 + Math.random() * 0.4,
  phase: Math.random() * Math.PI * 2,
  speed: 0.2 + Math.random() * 0.3,
  dx: (Math.random()-0.5) * 0.0002,
  dy: (Math.random()-0.5) * 0.0001,
}));

// Wind offset for tree animation
let windOffset = 0;
let t = 0;

// Mouse / touch tracking
const cursor = { x: null, lastMoved: 0 };
canvas.addEventListener('mousemove', e => {
  cursor.x = e.clientX / W;
  cursor.lastMoved = Date.now();
});
canvas.addEventListener('touchstart', e => {
  cursor.x = e.touches[0].clientX / W;
  cursor.lastMoved = Date.now();
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  cursor.x = e.touches[0].clientX / W;
  cursor.lastMoved = Date.now();
}, { passive: true });

// Fox state
const fox = {
  x: 0.35,
  dir: 1,
  walkFrame: 0,
  // auto-wander
  autoDir: 1,
  autoTarget: 0.5,
};

// Chickens
const NUM_CHICKENS = 4;
const chickens = Array.from({ length: NUM_CHICKENS }, (_, i) => ({
  x: 0.33 + i * 0.11,
  dir: (i % 2 === 0) ? 1 : -1,
  speed: 0.00004 + Math.random() * 0.00003,
  fleeSpeed: 0.00018 + Math.random() * 0.00008,
  fleeing: false,
  walkFrame: Math.random() * Math.PI * 2,
  cluckTimer: Math.random() * 3000,
  clucking: false,
  cluckDuration: 400,
}));

// Pixel drawing helpers
function px(x, y, color, size=1) {
  ctx.fillStyle = typeof color === 'string' ? color : rgb(color);
  ctx.fillRect(Math.round(x), Math.round(y), size*SCALE, size*SCALE);
}

function drawSky(period) {
  const pal = skyPalettes[period];
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  grad.addColorStop(0, rgb(pal.top));
  grad.addColorStop(1, rgb(pal.bottom));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.65);
}

function drawStars(period, nowMs) {
  let alpha = 0;
  if (period === 'night') alpha = 1;
  else if (period === 'dusk') alpha = 0.6;
  else if (period === 'dawn') alpha = 0.3;
  if (alpha <= 0) return;
  for (const s of stars) {
    const blink = 0.6 + 0.4 * Math.sin(nowMs * 0.001 * s.speed + s.blink);
    ctx.globalAlpha = alpha * blink;
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.round(s.x * W), Math.round(s.y * H), s.r * SCALE, s.r * SCALE);
  }
  ctx.globalAlpha = 1;
}

function drawMoon(period, nowMs) {
  let alpha = 0;
  if (period === 'night') alpha = 1;
  else if (period === 'dusk') alpha = 0.5;
  else if (period === 'dawn') alpha = 0.4;
  if (alpha <= 0) return;
  const mx = W * 0.75, my = H * 0.12;
  const r = 4 * SCALE;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#FFFACD';
  ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI*2); ctx.fill();
  // crater
  ctx.fillStyle = '#DDD090';
  ctx.beginPath(); ctx.arc(mx + r*0.3, my - r*0.15, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx - r*0.2, my + r*0.3, r*0.12, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawSun(period, nowMs) {
  let alpha = 0, sunY = H * 0.15;
  if (period === 'day') { alpha = 1; sunY = H * 0.12; }
  else if (period === 'morning') { alpha = 0.9; sunY = H * 0.18; }
  else if (period === 'evening') { alpha = 0.9; sunY = H * 0.22; }
  else if (period === 'dawn') { alpha = 0.7; sunY = H * 0.38; }
  else if (period === 'dusk') { alpha = 0.5; sunY = H * 0.42; }
  if (alpha <= 0) return;
  const sx = W * 0.15, r = 5 * SCALE;
  ctx.globalAlpha = alpha;
  // Glow
  const grd = ctx.createRadialGradient(sx, sunY, r*0.5, sx, sunY, r*2.5);
  grd.addColorStop(0, 'rgba(255,240,100,0.5)');
  grd.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(sx, sunY, r*2.5, 0, Math.PI*2); ctx.fill();
  // Sun body
  ctx.fillStyle = '#FFE040';
  ctx.beginPath(); ctx.arc(sx, sunY, r, 0, Math.PI*2); ctx.fill();
  // Pixel rays
  ctx.fillStyle = '#FFD000';
  const rayLen = 3 * SCALE;
  for (let i = 0; i < 8; i++) {
    const angle = (i/8)*Math.PI*2 + nowMs*0.0005;
    const rx1 = sx + Math.cos(angle) * (r+2);
    const ry1 = sunY + Math.sin(angle) * (r+2);
    const rx2 = sx + Math.cos(angle) * (r+2+rayLen);
    const ry2 = sunY + Math.sin(angle) * (r+2+rayLen);
    ctx.lineWidth = 2*SCALE;
    ctx.strokeStyle = '#FFD000';
    ctx.beginPath(); ctx.moveTo(rx1,ry1); ctx.lineTo(rx2,ry2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawCloud(cloud, nowMs, alpha) {
  if (alpha <= 0) return;
  ctx.globalAlpha = cloud.alpha * alpha;
  const cx = ((cloud.x + nowMs * cloud.speed) % 1.3 - 0.15) * W;
  const cy = cloud.y * H;
  const cw = cloud.w * 8 * SCALE;
  const ch = 4 * SCALE;
  ctx.fillStyle = '#fff';
  // Pixelated cloud shape
  const blocks = [
    [0, ch*0.5, cw, ch],
    [cw*0.15, 0, cw*0.5, ch],
    [cw*0.5, ch*0.2, cw*0.35, ch*0.8],
  ];
  for (const [bx, by, bw, bh] of blocks) {
    ctx.fillRect(Math.round(cx + bx), Math.round(cy + by), Math.round(bw), Math.round(bh));
  }
  ctx.globalAlpha = 1;
}

function drawBirds(period, nowMs) {
  let alpha = 0;
  if (period === 'day') alpha = 1;
  else if (period === 'morning' || period === 'evening') alpha = 0.7;
  if (alpha <= 0) return;
  ctx.globalAlpha = alpha;
  for (const b of birds) {
    const bx = ((b.x + nowMs * b.speed) % 1.2 - 0.1) * W;
    const by = b.y * H;
    const flap = Math.sin(nowMs * 0.001 * b.flapSpeed + b.flap);
    const s = b.size * SCALE;
    ctx.fillStyle = '#222';
    // Simple pixel bird: two wing pixels
    ctx.fillRect(Math.round(bx - s*2), Math.round(by + flap * s), s, s);
    ctx.fillRect(Math.round(bx - s), Math.round(by + flap * s * 0.5), s, s);
    ctx.fillRect(Math.round(bx), Math.round(by), s, s); // body
    ctx.fillRect(Math.round(bx + s), Math.round(by + flap * s * 0.5), s, s);
    ctx.fillRect(Math.round(bx + s*2), Math.round(by + flap * s), s, s);
  }
  ctx.globalAlpha = 1;
}

function drawGround(period) {
  const gc = groundColors[period];
  const groundY = H * 0.65;
  // Main ground
  ctx.fillStyle = rgb(gc);
  ctx.fillRect(0, groundY, W, H - groundY);
  // Darker bottom
  const darker = [Math.max(0,gc[0]-15), Math.max(0,gc[1]-25), Math.max(0,gc[2]-10)];
  ctx.fillStyle = rgb(darker);
  ctx.fillRect(0, groundY + (H-groundY)*0.5, W, (H-groundY)*0.5);
  // Grass pixel line
  ctx.fillStyle = period === 'night' ? '#1a3a1a' : '#4aaa30';
  for (let x = 0; x < W; x += SCALE) {
    const h2 = (Math.sin(x * 0.05 + windOffset * 0.5) * 0.5 + 0.5) * 2 * SCALE;
    ctx.fillRect(x, Math.round(groundY - h2), SCALE, Math.round(h2 + SCALE));
  }
}

// Pixel art house
function drawHouse(period) {
  const S = SCALE;
  const groundY = H * 0.65;
  const cx = W * 0.5;

  // Colors
  const isNight = period === 'night' || period === 'dusk';
  const wallC   = isNight ? '#5a4030' : '#c87840';
  const wallD   = isNight ? '#4a3020' : '#a06030';
  const roofC   = isNight ? '#2a1a1a' : '#6a2020';
  const roofD   = isNight ? '#1a0a0a' : '#4a1010';
  const winC    = isNight ? '#ffee80' : '#80c8ff';
  const doorC   = isNight ? '#3a2010' : '#7a4020';
  const chimC   = isNight ? '#333333' : '#666666';

  // House dimensions
  const hw = 40 * S; // house width
  const hh = 30 * S; // house height
  const hx = cx - hw/2;
  const hy = groundY - hh;

  // Roof
  const roofH = 20 * S;
  ctx.fillStyle = roofC;
  ctx.beginPath();
  ctx.moveTo(cx, hy - roofH);
  ctx.lineTo(hx + hw, hy);
  ctx.lineTo(hx, hy);
  ctx.closePath();
  ctx.fill();

  // Roof shadow
  ctx.fillStyle = roofD;
  ctx.beginPath();
  ctx.moveTo(cx, hy - roofH);
  ctx.lineTo(cx, hy);
  ctx.lineTo(hx, hy);
  ctx.closePath();
  ctx.fill();

  // Roof edge pixels
  ctx.fillStyle = isNight ? '#1a0808' : '#3a0808';
  for (let i = 0; i <= 40; i++) {
    const px2 = hx + i * S;
    const py2 = hy - (20 - i * 0.5) * S;
    ctx.fillRect(Math.round(px2), Math.round(py2), S, S);
    // Right side
    const px3 = hx + hw - i * S;
    ctx.fillRect(Math.round(px3), Math.round(py2), S, S);
  }

  // Chimney
  const chimX = cx + 8 * S;
  const chimW = 5 * S;
  const chimH = 12 * S;
  const chimY = hy - roofH * 0.55;
  ctx.fillStyle = chimC;
  ctx.fillRect(Math.round(chimX), Math.round(chimY - chimH + roofH*0.3), chimW, chimH);
  ctx.fillStyle = '#444';
  ctx.fillRect(Math.round(chimX - S), Math.round(chimY - chimH + roofH*0.3 - S), chimW + 2*S, 2*S);

  // Smoke
  if (isNight || period === 'dawn' || period === 'morning') {
    const t2 = Date.now() * 0.001;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 5; i++) {
      const sr = (2 + i) * S;
      const sy2 = chimY - chimH + roofH*0.3 - i * 5 * S + Math.sin(t2 + i) * S;
      const sx2 = chimX + chimW/2 + Math.sin(t2*0.7 + i*1.3) * 4 * S;
      ctx.fillStyle = `rgba(${isNight?'200,200,200':'180,180,180'},${0.7-i*0.12})`;
      ctx.beginPath(); ctx.arc(sx2, sy2, sr, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Walls
  ctx.fillStyle = wallC;
  ctx.fillRect(Math.round(hx), Math.round(hy), hw, hh);

  // Wall shadow (right)
  ctx.fillStyle = wallD;
  ctx.fillRect(Math.round(hx + hw*0.6), Math.round(hy), hw*0.4, hh);

  // Pixel brick pattern
  ctx.fillStyle = isNight ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.15)';
  for (let row = 0; row < 15; row++) {
    const offset = (row % 2) * 5 * S;
    for (let col = 0; col < 5; col++) {
      ctx.fillRect(
        Math.round(hx + col * 8 * S + offset),
        Math.round(hy + row * 2 * S + S),
        7 * S, S * 0.5
      );
    }
  }

  // Windows
  function drawWindow(wx, wy, lit) {
    const ww = 10 * S, wh = 10 * S;
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(Math.round(wx - S), Math.round(wy - S), ww + 2*S, wh + 2*S);
    if (lit) {
      ctx.fillStyle = winC;
      ctx.fillRect(Math.round(wx), Math.round(wy), ww, wh);
      // Cross divider
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(Math.round(wx + ww/2 - S*0.5), Math.round(wy), S, wh);
      ctx.fillRect(Math.round(wx), Math.round(wy + wh/2 - S*0.5), ww, S);
      // Light glow at night
      if (isNight) {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#ffee80';
        ctx.fillRect(Math.round(wx - 4*S), Math.round(wy - 4*S), ww + 8*S, wh + 8*S);
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.fillStyle = '#1a3050';
      ctx.fillRect(Math.round(wx), Math.round(wy), ww, wh);
    }
  }

  drawWindow(hx + 5*S, hy + 8*S, isNight || period === 'dusk');
  drawWindow(hx + hw - 15*S, hy + 8*S, isNight);

  // Door
  const dw = 10*S, dh = 16*S;
  const dx = cx - dw/2, dy = groundY - dh;
  ctx.fillStyle = '#2a1008';
  ctx.fillRect(Math.round(dx - S), Math.round(dy - S), dw + 2*S, dh + 2*S);
  ctx.fillStyle = doorC;
  ctx.fillRect(Math.round(dx), Math.round(dy), dw, dh);
  // Door arch
  ctx.fillStyle = isNight ? '#5a3018' : '#8a5028';
  ctx.fillRect(Math.round(dx), Math.round(dy), dw, dh*0.3);
  // Doorknob
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(Math.round(dx + dw*0.75), Math.round(dy + dh*0.5), S, S);
  // Step
  ctx.fillStyle = isNight ? '#3a3030' : '#8a7060';
  ctx.fillRect(Math.round(dx - 2*S), Math.round(groundY - 2*S), dw + 4*S, 2*S);
}

// Pixel tree
function drawTree(tx, baseY, h, period, wobble) {
  const S = SCALE;
  const isNight = period === 'night' || period === 'dusk';
  const trunkC = isNight ? '#3a2010' : '#6a3a10';
  const leafC  = isNight ? '#0a2a0a' : '#228822';
  const leafD  = isNight ? '#071507' : '#185018';
  const leafH  = isNight ? '#0f3a0f' : '#2aaa2a';

  const tw = 3 * S;
  const th = h * S;
  const trunkX = tx - tw/2;

  // Trunk
  ctx.fillStyle = trunkC;
  ctx.fillRect(Math.round(trunkX), Math.round(baseY - th*0.45), tw, Math.round(th*0.45));

  // Foliage (layered triangles, pixel style)
  const layers = 3;
  for (let l = 0; l < layers; l++) {
    const lh = th * (0.45 - l * 0.08);
    const lw = tw * (4 - l * 0.5) + (layers - l) * 3 * S;
    const ly = baseY - th*0.45 - l * th*0.22 + Math.sin(Date.now()*0.001*0.5 + wobble) * wobble * S;

    ctx.fillStyle = l === 1 ? leafD : leafC;
    ctx.beginPath();
    ctx.moveTo(Math.round(tx + Math.sin(Date.now()*0.001*0.7+wobble)*wobble*S*0.5), Math.round(ly - lh));
    ctx.lineTo(Math.round(tx + lw/2), Math.round(ly));
    ctx.lineTo(Math.round(tx - lw/2), Math.round(ly));
    ctx.closePath();
    ctx.fill();

    // Highlight
    ctx.fillStyle = leafH;
    ctx.beginPath();
    ctx.moveTo(Math.round(tx + Math.sin(Date.now()*0.001*0.7+wobble)*wobble*S*0.5), Math.round(ly - lh));
    ctx.lineTo(Math.round(tx), Math.round(ly));
    ctx.lineTo(Math.round(tx - lw * 0.2), Math.round(ly));
    ctx.closePath();
    ctx.fill();
  }
}

// Bush
function drawBush(bx, by, size, period) {
  const S = SCALE;
  const isNight = period === 'night' || period === 'dusk';
  const c1 = isNight ? '#0a2a0a' : '#228830';
  const c2 = isNight ? '#071507' : '#185020';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i === 1 ? c2 : c1;
    ctx.beginPath();
    ctx.arc(bx + (i-1)*size*S*0.7, by, size*S*(0.7+i*0.1), 0, Math.PI*2);
    ctx.fill();
  }
}

// Fireflies
function drawFireflies(period, nowMs) {
  let alpha = 0;
  if (period === 'night') alpha = 1;
  else if (period === 'dusk') alpha = 0.5;
  if (alpha <= 0) return;
  for (const f of fireflies) {
    f.x = ((f.x + f.dx + 1) % 1);
    f.y = Math.max(0.5, Math.min(0.92, f.y + f.dy + Math.sin(nowMs*0.001*f.speed + f.phase)*0.0005));
    const glow = 0.4 + 0.6 * Math.sin(nowMs * 0.003 * f.speed + f.phase);
    ctx.globalAlpha = alpha * glow;
    ctx.fillStyle = '#aaff44';
    const fx = f.x * W, fy = f.y * H;
    ctx.fillRect(Math.round(fx), Math.round(fy), SCALE, SCALE);
    // Glow
    ctx.globalAlpha = alpha * glow * 0.3;
    ctx.fillStyle = '#88ff22';
    ctx.fillRect(Math.round(fx - SCALE), Math.round(fy - SCALE), SCALE*3, SCALE*3);
  }
  ctx.globalAlpha = 1;
}

// Pixel path
function drawPath(period) {
  const S = SCALE;
  const groundY = H * 0.65;
  const cx = W * 0.5;
  const isNight = period === 'night' || period === 'dusk';
  ctx.fillStyle = isNight ? '#4a3828' : '#c8a878';
  // Path tiles
  const pathW = 12 * S;
  for (let i = 0; i < 8; i++) {
    const pw = pathW + i * 2 * S;
    ctx.fillStyle = isNight ? (i%2?'#3a2818':'#4a3828') : (i%2?'#b89868':'#c8a878');
    ctx.fillRect(Math.round(cx - pw/2), Math.round(groundY + i * 5 * S), pw, 5 * S);
  }
}

// Fence
function drawFence(period) {
  const S = SCALE;
  const groundY = H * 0.65;
  const isNight = period === 'night' || period === 'dusk';
  const fc = isNight ? '#4a3820' : '#d4a060';
  const posts = 30;
  const startX = W * 0.05;
  const endX   = W * 0.95;
  const step   = (endX - startX) / posts;

  ctx.fillStyle = fc;
  // Horizontal rails
  ctx.fillRect(Math.round(startX), Math.round(groundY - 7*S), Math.round(endX-startX), S);
  ctx.fillRect(Math.round(startX), Math.round(groundY - 4*S), Math.round(endX-startX), S);
  // Posts
  for (let i = 0; i <= posts; i++) {
    const px2 = startX + i * step;
    ctx.fillRect(Math.round(px2), Math.round(groundY - 10*S), S*2, 12*S);
    // Pointed top
    ctx.fillRect(Math.round(px2 + S*0.5), Math.round(groundY - 12*S), S, 2*S);
  }
}

// Pixel art chicken
function drawChicken(ch, period, nowMs, foxX) {
  const S = SCALE;
  const groundY = H * 0.65;
  const isNight = period === 'night' || period === 'dusk';

  // Flee logic
  const dist = Math.abs(ch.x - foxX);
  ch.fleeing = dist < 0.12;

  // Movement
  const spd = ch.fleeing ? ch.fleeSpeed : ch.speed;
  if (ch.fleeing) {
    ch.dir = ch.x > foxX ? 1 : -1;
  } else {
    if (Math.random() < 0.001) ch.dir *= -1;
  }
  ch.x += spd * ch.dir;
  if (ch.x > 0.90) { ch.dir = -1; ch.x = 0.90; }
  if (ch.x < 0.08) { ch.dir =  1; ch.x = 0.08; }
  ch.walkFrame += ch.fleeing ? 0.22 : 0.07;

  // Cluck timer
  ch.cluckTimer -= 16;
  if (ch.cluckTimer <= 0) {
    ch.clucking = true;
    ch.cluckTimer = 2000 + Math.random() * 5000;
    setTimeout(() => { ch.clucking = false; }, ch.cluckDuration);
  }

  const cx  = ch.x * W;
  const cy  = groundY;
  const bob = ch.fleeing
    ? Math.abs(Math.sin(ch.walkFrame)) * 2.5 * S
    : Math.abs(Math.sin(ch.walkFrame * 0.5)) * 0.8 * S;

  // Wing flap angle when fleeing
  const wingFlap = ch.fleeing ? Math.sin(ch.walkFrame * 2) * 3 * S : 0;

  // ---- Colors (realistic chicken: warm white/beige feathers) ----
  const bodyHi  = isNight ? '#9a8a70' : '#f5eedc'; // light feather highlight
  const bodyMid = isNight ? '#7a6a50' : '#d4c4a0'; // mid feather
  const bodySh  = isNight ? '#5a4a30' : '#b0a080'; // shadow underside
  const wingHi  = isNight ? '#8a7a60' : '#e8dcc8';
  const wingSh  = isNight ? '#6a5a40' : '#c4b490';
  const tailHi  = isNight ? '#7a6a50' : '#d8cca8';
  const tailSh  = isNight ? '#5a4a30' : '#b09870';
  const combC   = isNight ? '#7a1818' : '#cc2020';
  const wattleC = isNight ? '#8a1a1a' : '#dd1818';
  const beakC   = isNight ? '#907020' : '#d4a030';
  const legC    = isNight ? '#908050' : '#c8a040';
  const scaleC  = isNight ? '#706030' : '#b09030'; // leg scales
  const eyeC    = '#1a1010';
  const eyeHi   = '#fffbe0';

  // Draw facing right, flip canvas for left
  const flip = ch.dir === -1;
  ctx.save();
  if (flip) { ctx.translate(cx * 2, 0); ctx.scale(-1, 1); }

  const bx = cx; // base x

  // ---- LEGS & FEET ----
  const lstep = Math.sin(ch.walkFrame);
  const leg1y = cy - 4*S + lstep * 1.5 * S;
  const leg2y = cy - 4*S - lstep * 1.5 * S;
  // Thigh
  ctx.fillStyle = legC;
  ctx.fillRect(Math.round(bx - S),   Math.round(cy - 8*S - bob), S, 4*S);
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 8*S - bob), S, 4*S);
  // Lower leg (scaled)
  ctx.fillStyle = legC;
  ctx.fillRect(Math.round(bx - S),   Math.round(leg1y - bob), S, Math.round(cy - leg1y + bob));
  ctx.fillRect(Math.round(bx + 2*S), Math.round(leg2y - bob), S, Math.round(cy - leg2y + bob));
  // Scale marks
  ctx.fillStyle = scaleC;
  ctx.fillRect(Math.round(bx - S),   Math.round(leg1y + S - bob), S, S);
  ctx.fillRect(Math.round(bx + 2*S), Math.round(leg2y + S - bob), S, S);
  // Feet — 3 toes forward, 1 back
  ctx.fillStyle = legC;
  ctx.fillRect(Math.round(bx - 3*S), Math.round(cy - S), 2*S, S); // back toe
  ctx.fillRect(Math.round(bx - S),   Math.round(cy - S), S,   S);
  ctx.fillRect(Math.round(bx),       Math.round(cy - S), 3*S, S); // front toes
  ctx.fillRect(Math.round(bx + 3*S), Math.round(cy - S), S,   S);
  ctx.fillRect(Math.round(bx + 3*S), Math.round(cy - S + S*0.5), 2*S, S);
  // Toenail dots
  ctx.fillStyle = scaleC;
  ctx.fillRect(Math.round(bx - 3*S), Math.round(cy - S), S, S);
  ctx.fillRect(Math.round(bx + 4*S), Math.round(cy),     S, S);

  // ---- TAIL FEATHERS (drawn behind body) ----
  // Fan of 3 feathers
  ctx.fillStyle = tailSh;
  ctx.fillRect(Math.round(bx - 7*S), Math.round(cy - 12*S - bob), 2*S, 6*S);
  ctx.fillRect(Math.round(bx - 8*S), Math.round(cy - 15*S - bob), 2*S, 4*S);
  ctx.fillRect(Math.round(bx - 6*S), Math.round(cy - 16*S - bob), 2*S, 3*S);
  ctx.fillStyle = tailHi;
  ctx.fillRect(Math.round(bx - 7*S), Math.round(cy - 14*S - bob), S,   4*S);
  ctx.fillRect(Math.round(bx - 8*S), Math.round(cy - 16*S - bob), S,   3*S);
  ctx.fillRect(Math.round(bx - 6*S), Math.round(cy - 17*S - bob), S,   2*S);

  // ---- BODY ----
  // Shadow bottom
  ctx.fillStyle = bodySh;
  ctx.fillRect(Math.round(bx - 5*S), Math.round(cy - 9*S  - bob), 8*S, 2*S);
  // Mid body
  ctx.fillStyle = bodyMid;
  ctx.fillRect(Math.round(bx - 5*S), Math.round(cy - 13*S - bob), 8*S, 5*S);
  // Round top highlight
  ctx.fillStyle = bodyHi;
  ctx.fillRect(Math.round(bx - 4*S), Math.round(cy - 15*S - bob), 6*S, 3*S);
  ctx.fillRect(Math.round(bx - 3*S), Math.round(cy - 16*S - bob), 4*S, S);
  // Breast (lighter)
  ctx.fillStyle = bodyHi;
  ctx.fillRect(Math.round(bx - 2*S), Math.round(cy - 11*S - bob), 3*S, 3*S);

  // ---- WING ----
  ctx.fillStyle = wingHi;
  ctx.fillRect(Math.round(bx - 4*S), Math.round(cy - 14*S - bob + wingFlap), 6*S, 4*S);
  ctx.fillStyle = wingSh;
  ctx.fillRect(Math.round(bx - 4*S), Math.round(cy - 11*S - bob + wingFlap), 6*S, 2*S);
  // Wing feather tips
  ctx.fillStyle = wingSh;
  ctx.fillRect(Math.round(bx - 4*S), Math.round(cy - 10*S - bob + wingFlap), S, 2*S);
  ctx.fillRect(Math.round(bx - 3*S), Math.round(cy - 10*S - bob + wingFlap), S, S);
  ctx.fillRect(Math.round(bx + S),   Math.round(cy - 10*S - bob + wingFlap), S, 2*S);

  // ---- NECK ----
  ctx.fillStyle = bodyMid;
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 18*S - bob), 3*S, 4*S);
  ctx.fillStyle = bodyHi;
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 18*S - bob), 2*S, 4*S);

  // ---- HEAD ----
  // Head base
  ctx.fillStyle = bodyMid;
  ctx.fillRect(Math.round(bx + S),   Math.round(cy - 22*S - bob), 5*S, 4*S);
  // Head highlights
  ctx.fillStyle = bodyHi;
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 23*S - bob), 3*S, 2*S);
  ctx.fillRect(Math.round(bx + S),   Math.round(cy - 22*S - bob), S,   3*S);
  // Face (cheek/ear patch — slightly different tone)
  ctx.fillStyle = bodyMid;
  ctx.fillRect(Math.round(bx + 4*S), Math.round(cy - 21*S - bob), 2*S, 2*S);

  // ---- COMB (3-pointed) ----
  ctx.fillStyle = combC;
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 26*S - bob), S,   3*S);
  ctx.fillRect(Math.round(bx + 3*S), Math.round(cy - 25*S - bob), S,   3*S);
  ctx.fillRect(Math.round(bx + 4*S), Math.round(cy - 24*S - bob), S,   2*S);
  // Comb base connecting
  ctx.fillRect(Math.round(bx + 2*S), Math.round(cy - 23*S - bob), 3*S, S);

  // ---- WATTLE (red under beak) ----
  ctx.fillStyle = wattleC;
  ctx.fillRect(Math.round(bx + 5*S), Math.round(cy - 20*S - bob), S,   2*S);
  ctx.fillRect(Math.round(bx + 5*S), Math.round(cy - 19*S - bob), 2*S, S);

  // ---- BEAK ----
  ctx.fillStyle = beakC;
  ctx.fillRect(Math.round(bx + 6*S), Math.round(cy - 22*S - bob), 2*S, S);
  // Open beak when clucking
  if (ch.clucking) {
    ctx.fillStyle = beakC;
    ctx.fillRect(Math.round(bx + 6*S), Math.round(cy - 21*S - bob), 2*S, S);
    ctx.fillStyle = '#cc2020'; // inside mouth
    ctx.fillRect(Math.round(bx + 6*S), Math.round(cy - 21*S - bob), S,   S);
  }

  // ---- EYE ----
  ctx.fillStyle = eyeC;
  ctx.fillRect(Math.round(bx + 3*S), Math.round(cy - 22*S - bob), 2*S, 2*S);
  // Eye highlight
  ctx.fillStyle = eyeHi;
  ctx.fillRect(Math.round(bx + 4*S), Math.round(cy - 23*S - bob), S,   S);

  ctx.restore();
}

// Pixel art fox
function drawDog(period, nowMs) {
  const S = SCALE;
  const groundY = H * 0.65;
  const isNight = period === 'night' || period === 'dusk';

  // Update fox movement
  const IDLE_MS = 2500; // ms bez ruchu kursora → tryb auto
  const cursorActive = cursor.x !== null && (Date.now() - cursor.lastMoved) < IDLE_MS;

  let targetX;
  if (cursorActive) {
    // Podążaj za kursorem, ogranicz do terenu
    targetX = Math.max(0.06, Math.min(0.92, cursor.x));
  } else {
    // Auto-wędrówka: wybierz losowy cel i dąż do niego
    if (Math.abs(fox.x - fox.autoTarget) < 0.02 || Math.random() < 0.002) {
      fox.autoTarget = 0.15 + Math.random() * 0.70;
    }
    targetX = fox.autoTarget;
  }

  const foxSpeed = cursorActive ? 0.0010 : 0.0004;
  const dx2 = targetX - fox.x;
  if (Math.abs(dx2) > 0.005) {
    fox.x += Math.sign(dx2) * Math.min(Math.abs(dx2), foxSpeed);
    fox.dir = dx2 > 0 ? 1 : -1;
    fox.walkFrame = nowMs * 0.01;
  }

  const dx = fox.x * W;
  const dy = groundY;
  const flip = fox.dir === -1;

  ctx.save();
  if (flip) {
    ctx.translate(dx, 0);
    ctx.scale(-1, 1);
    ctx.translate(-dx, 0);
  }

  // Fox colors
  const bodyC  = isNight ? '#7a3010' : '#e05c10'; // orange-red
  const bellyC = isNight ? '#5a4030' : '#f0c890'; // cream/white belly
  const darkC  = isNight ? '#1a0a00' : '#2a1000'; // dark brown/black legs
  const tailC  = isNight ? '#7a3010' : '#e05c10'; // same as body
  const tailTip = isNight ? '#555555' : '#ffffff'; // white tail tip
  const earIn  = isNight ? '#3a1010' : '#c03010'; // dark inner ear
  const noseC  = '#1a0800';
  const eyeC   = isNight ? '#ffcc00' : '#2a1800'; // yellow glow at night

  // Fox only walks now (no sitting — follows cursor)
  const moving = Math.abs(targetX - fox.x) > 0.005;
  const leg  = moving ? Math.sin(fox.walkFrame) * 1.5 * S : 0;
  const leg2 = moving ? Math.sin(fox.walkFrame + Math.PI) * 1.5 * S : 0;

  if (false) {
    // (sitting pose kept for reference but disabled)
    ctx.fillStyle = tailC;
    ctx.fillRect(Math.round(dx - 8*S), Math.round(dy - 6*S), 4*S, 5*S);
    ctx.fillRect(Math.round(dx - 7*S), Math.round(dy - 8*S), 3*S, 3*S);
    ctx.fillStyle = tailTip;
    ctx.fillRect(Math.round(dx - 8*S), Math.round(dy - 8*S), 2*S, 2*S);
    // Haunches
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx - 5*S), Math.round(dy - 5*S), 4*S, 5*S);
    // Body
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx - 4*S), Math.round(dy - 9*S), 7*S, 5*S);
    // Belly
    ctx.fillStyle = bellyC;
    ctx.fillRect(Math.round(dx - 2*S), Math.round(dy - 8*S), 4*S, 4*S);
    // Front paws
    ctx.fillStyle = darkC;
    ctx.fillRect(Math.round(dx - 2*S), Math.round(dy - 2*S), 2*S, 3*S);
    ctx.fillRect(Math.round(dx + 2*S), Math.round(dy - 2*S), 2*S, 3*S);
    // Neck
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 1*S), Math.round(dy - 13*S), 3*S, 5*S);
    // Head (pointed fox face)
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx), Math.round(dy - 17*S), 6*S, 5*S);
    // Pointed ears
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + S), Math.round(dy - 20*S), 2*S, 3*S);
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 20*S), 2*S, 3*S);
    ctx.fillStyle = earIn;
    ctx.fillRect(Math.round(dx + S), Math.round(dy - 19*S), S, 2*S);
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 19*S), S, 2*S);
    // Long pointed snout
    ctx.fillStyle = bellyC;
    ctx.fillRect(Math.round(dx + 2*S), Math.round(dy - 14*S), 3*S, 2*S);
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 15*S), 3*S, 2*S);
    ctx.fillRect(Math.round(dx + 6*S), Math.round(dy - 14*S), 2*S, 2*S);
    // Nose
    ctx.fillStyle = noseC;
    ctx.fillRect(Math.round(dx + 7*S), Math.round(dy - 14*S), S, S);
    // Eye
    ctx.fillStyle = eyeC;
    ctx.fillRect(Math.round(dx + 3*S), Math.round(dy - 16*S), S, S);

  } else {
    // === WALKING ===
    // Back legs (dark)
    ctx.fillStyle = darkC;
    ctx.fillRect(Math.round(dx - 5*S), Math.round(dy - 4*S + leg),  2*S, 4*S + Math.abs(leg));
    ctx.fillRect(Math.round(dx - 2*S), Math.round(dy - 4*S + leg2), 2*S, 4*S + Math.abs(leg2));
    // Body
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx - 7*S), Math.round(dy - 9*S), 11*S, 5*S);
    // Belly stripe
    ctx.fillStyle = bellyC;
    ctx.fillRect(Math.round(dx - 4*S), Math.round(dy - 8*S), 6*S, 3*S);
    // Front legs (dark)
    ctx.fillStyle = darkC;
    ctx.fillRect(Math.round(dx + 2*S), Math.round(dy - 4*S + leg2), 2*S, 4*S + Math.abs(leg2));
    ctx.fillRect(Math.round(dx + 5*S), Math.round(dy - 4*S + leg),  2*S, 4*S + Math.abs(leg));
    // Bushy tail (sweeping)
    const wag = Math.sin(nowMs * 0.005) * 3 * S;
    ctx.fillStyle = tailC;
    ctx.fillRect(Math.round(dx - 9*S), Math.round(dy - 8*S + wag*0.5), 3*S, 3*S);
    ctx.fillRect(Math.round(dx - 11*S), Math.round(dy - 11*S + wag), 4*S, 3*S);
    ctx.fillRect(Math.round(dx - 12*S), Math.round(dy - 14*S + wag*1.3), 3*S, 3*S);
    // White tail tip
    ctx.fillStyle = tailTip;
    ctx.fillRect(Math.round(dx - 13*S), Math.round(dy - 16*S + wag*1.5), 3*S, 3*S);
    // Neck
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 12*S), 3*S, 4*S);
    // Head
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 3*S), Math.round(dy - 16*S), 7*S, 5*S);
    // Pointed ears (tall triangular)
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 20*S), 2*S, 4*S);
    ctx.fillRect(Math.round(dx + 8*S), Math.round(dy - 20*S), 2*S, 4*S);
    ctx.fillStyle = earIn;
    ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 19*S), S, 3*S);
    ctx.fillRect(Math.round(dx + 8*S), Math.round(dy - 19*S), S, 3*S);
    // Long pointed snout
    ctx.fillStyle = bodyC;
    ctx.fillRect(Math.round(dx + 8*S), Math.round(dy - 14*S), 5*S, 3*S);
    ctx.fillStyle = bellyC;
    ctx.fillRect(Math.round(dx + 8*S), Math.round(dy - 13*S), 4*S, 2*S);
    // Nose
    ctx.fillStyle = noseC;
    ctx.fillRect(Math.round(dx + 12*S), Math.round(dy - 14*S), S, S);
    // Eye (bright at night)
    ctx.fillStyle = eyeC;
    ctx.fillRect(Math.round(dx + 5*S), Math.round(dy - 15*S), S, S);
    if (isNight) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(Math.round(dx + 4*S), Math.round(dy - 16*S), 3*S, 3*S);
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// POGODA  (Piastów, woj. mazowieckie, aktualna)
// Zachmurzenie zmienne · 13°C · wiatr ~3 m/s
// ─────────────────────────────────────────────────────────────
const WEATHER = { temp: 13, wind: 3, desc: 'Zachmurzenie zmienne', type: 'cloudy' };

// Dodatkowe chmury pogodowe – ciemniejsze i cięższe
const weatherClouds = Array.from({length: 10}, (_, i) => ({
  x:     i * 0.11 + Math.random() * 0.08,
  y:     0.03 + Math.random() * 0.26,
  w:     5 + Math.floor(Math.random() * 7),
  speed: 0.000012 + Math.random() * 0.000022,
  alpha: 0.55 + Math.random() * 0.38,
  grey:  0.3  + Math.random() * 0.6   // 0=białe, 1=ciemnoszare
}));

function drawWeatherClouds(nowMs) {
  for (const cl of weatherClouds) {
    const cx = ((cl.x + nowMs * cl.speed) % 1.35 - 0.15) * W;
    const cy = cl.y * H;
    const cw = cl.w * 8 * SCALE;
    const ch = 5 * SCALE;
    const g  = Math.round(200 - cl.grey * 55);       // 145–200
    ctx.globalAlpha = cl.alpha;
    ctx.fillStyle   = `rgb(${g},${g + 4},${g + 8})`;
    for (const [bx, by, bw, bh] of [
      [0,        ch * 0.5,  cw,        ch       ],
      [cw * 0.10, 0,        cw * 0.55, ch * 1.05],
      [cw * 0.45, ch * 0.15,cw * 0.40, ch * 0.90],
    ]) ctx.fillRect(Math.round(cx + bx), Math.round(cy + by), Math.round(bw), Math.round(bh));
    ctx.globalAlpha = 1;
  }
}

function drawOvercast(period) {
  const night = period === 'night' || period === 'dusk';
  ctx.globalAlpha = night ? 0.10 : 0.20;
  const gr = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  gr.addColorStop(0,    'rgb(155,170,188)');
  gr.addColorStop(0.55, 'rgba(180,192,205,0.45)');
  gr.addColorStop(1,    'rgba(200,210,215,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, W, H * 0.65);
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────────
// AUDIO  —  muzyka ambient + odgłosy natury (Web Audio API)
// Kliknij przycisk ♪ aby włączyć (blokada autoplay przeglądarki)
// ─────────────────────────────────────────────────────────────
let audioCtx   = null;
let masterGain = null;
let audioOn    = false;
let birdTimer  = null;
let musicTimer = null;

function toggleAudio() {
  audioOn = !audioOn;
  const btn = document.getElementById('audio-btn');
  if (audioOn) {
    btn.textContent = '♪ Dźwięk: ON';
    if (!audioCtx) {
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
      startWind();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.65, audioCtx.currentTime + 1.0);
    scheduleBird();
    scheduleNote();
  } else {
    btn.textContent = '♪ Dźwięk: OFF';
    if (audioCtx) {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
    }
    clearTimeout(birdTimer);
    clearTimeout(musicTimer);
  }
}

// Wiatr – szum biały filtrowany pętlą
function startWind() {
  const sr  = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * 3, sr);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop   = true;

  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 650;

  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 260; bpf.Q.value = 0.8;

  const wg = audioCtx.createGain();
  wg.gain.value = 0.07;

  src.connect(lpf); lpf.connect(bpf); bpf.connect(wg); wg.connect(masterGain);
  src.start();

  (function breathe() {
    if (!audioCtx) return;
    wg.gain.linearRampToValueAtTime(
      0.04 + Math.random() * 0.09,
      audioCtx.currentTime + 1.5 + Math.random() * 2.5
    );
    setTimeout(breathe, (1.8 + Math.random() * 2.5) * 1000);
  })();
}

// Śpiew ptaków – losowe trelele
function scheduleBird() {
  birdTimer = setTimeout(() => {
    if (audioOn && audioCtx) { playBird(); scheduleBird(); }
  }, 1800 + Math.random() * 7000);
}

function playBird() {
  const t0 = audioCtx.currentTime;
  const n  = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const t2  = t0 + i * (0.07 + Math.random() * 0.13);
    const bf  = 880 + Math.random() * 1400;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(bf, t2);
    osc.frequency.exponentialRampToValueAtTime(bf * (1.15 + Math.random() * 0.4), t2 + 0.06);
    osc.frequency.exponentialRampToValueAtTime(bf * 0.88, t2 + 0.16);
    env.gain.setValueAtTime(0,    t2);
    env.gain.linearRampToValueAtTime(0.19, t2 + 0.015);
    env.gain.linearRampToValueAtTime(0,    t2 + 0.19);
    osc.connect(env); env.connect(masterGain);
    osc.start(t2); osc.stop(t2 + 0.22);
  }
}

// Muzyka ambient – pentatonika C-dur (pianino)
const PIANO = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99];
let noteAt  = 0;

function scheduleNote() {
  if (!audioOn || !audioCtx) return;
  if (noteAt < audioCtx.currentTime) noteAt = audioCtx.currentTime + 0.05;

  const freq = PIANO[Math.floor(Math.random() * PIANO.length)];
  const dur  = 2.2 + Math.random() * 2.8;
  const t0   = noteAt;

  // Fundamentalna + 2. harmoniczna = ciepłe brzmienie pianino
  [freq, freq * 2].forEach((f, hi) => {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 1300;
    osc.type = 'sine';
    osc.frequency.value = f;
    osc.detune.value = (Math.random() - 0.5) * 7;
    const pk = hi === 0 ? 0.10 : 0.032;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(pk, t0 + 0.22);
    env.gain.setValueAtTime(pk * 0.8, t0 + dur - 1.0);
    env.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.connect(env); env.connect(lpf); lpf.connect(masterGain);
    osc.start(t0); osc.stop(t0 + dur + 0.1);
  });

  noteAt += 1.0 + Math.random() * 2.5;
  musicTimer = setTimeout(scheduleNote,
    Math.max(50, (noteAt - audioCtx.currentTime - 0.12) * 1000));
}

function updateWeatherInfo() {
  document.getElementById('weather-info').textContent =
    `Piastów ☁ ${WEATHER.temp}°C · wiatr ${WEATHER.wind} m/s`;
}

// UI overlay update
function updateUI(period, hour, min, sec) {
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('time-display').textContent = `${pad(hour)}:${pad(min)}:${pad(sec)}`;

  const greetings = {
    night:   'Dobranoc!', dawn: 'Dzień dobry!',
    morning: 'Dzień dobry!', day: 'Miłego dnia!',
    evening: 'Dobry wieczór!', dusk: 'Dobry wieczór!'
  };
  const periods = {
    night: 'Noc', dawn: 'Świt', morning: 'Ranek',
    day: 'Dzień', evening: 'Wieczór', dusk: 'Zmierzch'
  };
  document.getElementById('greeting').textContent = greetings[period];
  document.getElementById('period-display').textContent = periods[period];

  // Text color
  const light = period === 'day' || period === 'morning';
  const el = document.getElementById('overlay');
  el.style.color = light ? '#fff' : '#fff';
}

// Main draw
function draw(nowMs) {
  const now = new Date();
  const hour = now.getHours(), min = now.getMinutes(), sec = now.getSeconds();
  const period = getPeriod(hour);

  windOffset = nowMs * 0.0005;
  t = nowMs * 0.001;

  ctx.clearRect(0, 0, W, H);

  // Sky
  drawSky(period);
  drawStars(period, nowMs);
  drawMoon(period, nowMs);
  drawSun(period, nowMs);

  // Sky overlay (zachmurzenie)
  drawOvercast(period);

  // Clouds – przy zachmurzeniu więcej i ciemniejsze
  const baseAlpha  = period === 'day' ? 1 : period === 'morning' || period === 'evening' ? 0.6 : period === 'dawn' ? 0.4 : 0.15;
  const cloudAlpha = WEATHER.type === 'cloudy' ? Math.min(1, baseAlpha + 0.25) : (baseAlpha > 0.15 ? baseAlpha : 0);
  for (const c of clouds) drawCloud(c, nowMs, cloudAlpha);
  drawWeatherClouds(nowMs);

  drawBirds(period, nowMs);
  drawGround(period);
  drawPath(period);
  drawFence(period);

  // Trees (background)
  const groundY = H * 0.65;
  drawTree(W*0.12, groundY, 45, period, 1.2);
  drawTree(W*0.18, groundY, 38, period, 0.8);
  drawTree(W*0.82, groundY, 42, period, 1.0);
  drawTree(W*0.88, groundY, 35, period, 1.5);
  drawTree(W*0.72, groundY, 40, period, 0.9);
  drawTree(W*0.28, groundY, 36, period, 1.3);

  // Bushes near house
  drawBush(W*0.38, groundY, 5, period);
  drawBush(W*0.62, groundY, 4, period);
  drawBush(W*0.35, groundY, 3, period);
  drawBush(W*0.65, groundY, 3.5, period);

  // House
  drawHouse(period);

  // Chickens (before fox so fox renders on top)
  for (const ch of chickens) drawChicken(ch, period, nowMs, fox.x);

  // Fox
  drawDog(period, nowMs);

  // Fireflies
  drawFireflies(period, nowMs);

  // Update UI
  updateUI(period, hour, min, sec);

  requestAnimationFrame(draw);
}

document.getElementById('audio-btn').addEventListener('click', toggleAudio);
updateWeatherInfo();

requestAnimationFrame(draw);
</script>
